services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-database}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -q -d ${DB_DATABASE:-database} -U ${DB_PASSWORD:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # DB de test
  db_test:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-database}-test
    volumes:
      - postgres-data-test:/var/lib/postgresql
    ports:
      - '5435:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -q -d ${DB_DATABASE:-database}-test -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  postgres-data-test:
  uploads:
